name: Bug Report
description: File a bug report
title: "[Bug] "
labels: ["bug"] 
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:** Search [open & closed issues](https://github.com/stonerl/Thaw/issues?q=is%3Aissue) for duplicates.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues (open & closed) and found no duplicates
          required: true
        - label: I'm using the latest app version
          required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App Version
      placeholder: e.g. 1.2.3
    validations:
      required: true

  - type: input
    id: macos_version
    attributes:
      label: macOS Version
      placeholder: e.g. 26.0 (Tahoe)
    validations:
      required: true

  - type: dropdown
    id: monitor_setup
    attributes:
      label: Display Setup
      options:
        - Single monitor
        - Multiple monitors
    validations:
      required: true

  - type: upload
    id: logs
    attributes:
      label: Logs / Console Output
      description: Please ensure you have reproduced the issue with Diagnostic logging enabled (Settings → Advanced → Diagnostics → Enable diagnostic logging).
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, configuration details, etc.
    validations:
      required: false
